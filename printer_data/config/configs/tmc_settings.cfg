#####################################################################
#   X/Y TMC2209 — Performance‑Focused
#####################################################################

[tmc2209 stepper_x]
uart_pin: PC4
interpolate: true
run_current: 1.2
hold_current: 0.40
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_y]
uart_pin: PD11
interpolate: true
run_current: 1.2
hold_current: 0.40
sense_resistor: 0.110
stealthchop_threshold: 0



#####################################################################
#   Z0–Z3 TMC2208 — Silent with Z‑Hop Torque
#####################################################################

[tmc2208 stepper_z]
uart_pin: PC6
interpolate: true
run_current: 0.8           # ≈67% of 1.8 A for safe temps
hold_current: 0.30          # 25% of run_current
sense_resistor: 0.110
stealthchop_threshold: 15   # mm/s; silent below 15 mm/s, SpreadCycle above for Z‑hops

[tmc2208 stepper_z1]
uart_pin: PC7
interpolate: true
run_current: 0.8
hold_current: 0.30
sense_resistor: 0.110
stealthchop_threshold: 15

[tmc2208 stepper_z2]
uart_pin: PF2
interpolate: true
run_current: 0.8
hold_current: 0.30
sense_resistor: 0.110
stealthchop_threshold: 15

[tmc2208 stepper_z3]
uart_pin: PE4
interpolate: true
run_current: 0.8
hold_current: 0.30
sense_resistor: 0.110
stealthchop_threshold: 15


#####################################################################
#   Extruder TMC2209 — Torque & Retraction‑Ready
#####################################################################

[tmc2209 extruder]
uart_pin: EBBCan:gpio20
interpolate: true
run_current: 0.8            # 100% of 1.0 A for maximum extrusion torque
hold_current: 0.25          # 25% of run_current; minimal idle heating
sense_resistor: 0.110
stealthchop_threshold: 0    # mm/s; forces SpreadCycle for any significant retraction/print moves
