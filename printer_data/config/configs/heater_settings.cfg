
[thermistor my_10k_ntc]
temperature1: 25
resistance1: 10000  # Resistance at 25°C
beta: 3950

[temperature_sensor chamber]
sensor_type: my_10k_ntc
sensor_pin: PF4
min_temp: 0
max_temp: 100
gcode_id: C

#— Main‑board (STM32) silicon temperature — 
[temperature_sensor main_mcu_temp]
sensor_type: temperature_mcu
sensor_mcu: mcu    # matches [mcu]
min_temp: 0
max_temp: 100

#— RP2040 on CAN‑bus silicon temperature —
[temperature_sensor ebccan_temp]
sensor_type: temperature_mcu
sensor_mcu: EBBCan  # matches [mcu EBBCan]
min_temp: 0
max_temp: 150




#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]

heater_pin: PA3
sensor_type: Generic 3950
sensor_pin: PF3

max_power: 1.0
min_temp: 0
max_temp: 120
