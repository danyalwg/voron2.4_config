#####################################################################
#                         MACROS CONFIG                            #
#   Organized into: Filament Dryer | Print Lifecycle | Bed/Tool   #
#####################################################################

;========================================================================
; FILAMENT DRYER MACROS
;------------------------------------------------------------------------
; Use the heated bed as a filament dryer. START_DRYER/TIME/TEMP, STOP_DRYER
; and three presets: DRY_PLA, DRY_PETG, DRY_ABS.
;========================================================================

[gcode_macro START_DRYER]
description: Start the heated bed filament dryer.
gcode:
    {% set BedTemperature = params.TEMPERATURE | default(50.0) | float %}
    {% set DryTime       = params.TIME        | default(14400) | int   %}

    ;-- Turn on bed heater (non-blocking)
    M140 S{BedTemperature}

    ;-- Store dryer status for delayed updates
    SET_GCODE_VARIABLE MACRO=DRYER_STATUS VARIABLE=time_remaining    VALUE={DryTime}
    SET_GCODE_VARIABLE MACRO=DRYER_STATUS VARIABLE=bed_temperature   VALUE={BedTemperature}
    UPDATE_DELAYED_GCODE ID=DRYER_TIMER DURATION=1

[gcode_macro STOP_DRYER]
description: Stop the filament dryer immediately.
gcode:
    M140 S0                              ; Turn off bed heater
    SET_GCODE_VARIABLE MACRO=DRYER_STATUS VARIABLE=time_remaining VALUE=0
    UPDATE_DELAYED_GCODE ID=DRYER_TIMER DURATION=0
    M117 Drying Stopped

[gcode_macro DRYER_STATUS]
description: Internal status checker for the dryer timer.
variable_time_remaining: 0
variable_bed_temperature: 0
gcode:
    {% if time_remaining > 0 %}
        ;-- Keep heater alive and display countdown
        M140 S{bed_temperature}
        SET_GCODE_VARIABLE MACRO=DRYER_STATUS VARIABLE=time_remaining VALUE={time_remaining - 1}
        M117 Drying... {time_remaining}s left
    {% else %}
        STOP_DRYER
    {% endif %}

[delayed_gcode DRYER_TIMER]
gcode:
    UPDATE_DELAYED_GCODE ID=DRYER_TIMER DURATION=1
    DRYER_STATUS

;-- Preset convenience macros (adjust defaults as desired)
[gcode_macro DRY_PLA]
description: Dry PLA at 65°C for 4h.
gcode:
    START_DRYER TEMPERATURE=65 TIME=14400

[gcode_macro DRY_PETG]
description: Dry PETG at 100°C for 8h.
gcode:
    START_DRYER TEMPERATURE=100 TIME=28800

[gcode_macro DRY_ABS]
description: Dry ABS at 80°C for 4h.
gcode:
    START_DRYER TEMPERATURE=80 TIME=14400


;========================================================================
; PRINT START / PRINT END
;------------------------------------------------------------------------
; PRINT_START: Homing → Bed Prep → Mesh → Hotend → Printbeginn
; PRINT_END:  Parking, Cool-down, Cleanup
;========================================================================

[gcode_macro PRINT_START]
description: Standard QGL print start sequence.
gcode:
  {% set target_bed      = params.BED       | int %}
  {% set target_extruder = params.EXTRUDER  | int %}
  {% set x_wait          = printer.toolhead.axis_maximum.x / 2 %}
  {% set y_wait          = printer.toolhead.axis_maximum.y / 2 %}
  {% set homed           = printer.toolhead.homed_axes %}
  {% set chamber_temp    = printer['temperature_sensor chamber'].temperature | float %}

  SKEW_PROFILE LOAD=my_skew_profile

  ;-- Homing & LED feedback
  STATUS_HOMING
  {% if 'x' not in homed or 'y' not in homed %} G28 X Y {% endif %}
  G28 Z
  G90
  CLEAN_NOZZLE

  ;-- Bed prep & optional ABS chamber wait
  SET_DISPLAY_TEXT MSG="Bed: {target_bed}°C"
  STATUS_HEATING
  G1 X{x_wait} Y{y_wait} Z15 F9000
  M190 S{target_bed}
  {% if target_bed > 90 %}
    M106 S255
    {% if chamber_temp < 40 %}
      SET_DISPLAY_TEXT MSG="Waiting for chamber > 40°C"
      {% for _ in range(300) %}
        {% set chamber_temp = printer['temperature_sensor chamber'].temperature | float %}
        {% if chamber_temp >= 40 %} BREAK {% endif %}
        G4 P1000
      {% endfor %}
    {% endif %}
  {% endif %}

  ;-- Leveling & mesh calibration
  SET_DISPLAY_TEXT MSG="Leveling"
  STATUS_LEVELING
  QUAD_GANTRY_LEVEL
  CLEAN_NOZZLE
  G28 Z

  SET_DISPLAY_TEXT MSG="Bed Mesh Calibration"
  STATUS_MESHING
  BED_MESH_CALIBRATE

  ;-- Hotend heat & final prep
  SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}°C"
  STATUS_HEATING
  M107
  M109 S{target_extruder}

  SET_DISPLAY_TEXT MSG="Printing"
  
  STATUS_BUSY
  LINE_PURGE
  G90


[gcode_macro PRINT_END]
description: Standard print end; parking and cooldown.
gcode:
    ;-- Safe retract & heaters off
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + (20 if th.axis_maximum.x - th.position.x > 20 else -20) %}
    {% set y_safe = th.position.y + (20 if th.axis_maximum.y - th.position.y > 20 else -20) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z] | min %}

    SET_SKEW CLEAR=1
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    M400                          ; Wait for moves
    G92 E0                        ; Zero extruder
    G1 E-5.0 F1800                ; Retract
    TURN_OFF_HEATERS

    G90
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; Park to avoid stringing
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600
    M107                             ; Fan off

    BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END


;========================================================================
; BED & TOOLHEAD MAINTENANCE
;------------------------------------------------------------------------
; G32 (level), MOVE_TO_CENTER, LOAD/UNLOAD_FILAMENT, CLEAN_NOZZLE(_PARK)
;========================================================================

[gcode_macro G32]
description: Auto bed => gantry level sequence.
gcode:
    G28
    QUAD_GANTRY_LEVEL
    G28
    ## Uncomment and adjust for your build volume:
    # G0 X150 Y150 Z30 F3600

[gcode_macro MOVE_TO_CENTER]
description: Move toolhead to center with style.
gcode:
    G91                        ; Relative
    G1 Z10 F300                ; Lift Z
    G90                        ; Absolute
    G1 X150 Y150 F6000         ; Rapid XY to center
    G1 Z60 F1000               ; Descend to Z60
    G1 Z55 F600                ; Slow to Z55
    G1 Z50 F300                ; Final Z50
    G4 P500                    ; Pause
    M117 "Center Position Reached"

[gcode_macro LOAD_FILAMENT]
description: Heat and load filament with LED cues.
gcode:
    {% set speed        = params.SPEED | default(300) %}
    {% set temp         = params.TEMP  | default(230) %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity %}

    SAVE_GCODE_STATE NAME=load_state
    STATUS_HEATING
    M104 S{temp}
    M109 S{temp}

    STATUS_BUSY
    G91
    G92 E0
    G1 E350 F{max_velocity}
    G1 E25 F{speed}

    STATUS_READY
    RESTORE_GCODE_STATE NAME=load_state
    M104 S0

[gcode_macro UNLOAD_FILAMENT]
description: Heat and unload filament with LED cues.
gcode:
    {% set speed        = params.SPEED | default(300) %}
    {% set temp         = params.TEMP  | default(230) %}
    {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity %}

    SAVE_GCODE_STATE NAME=unload_state
    STATUS_HEATING
    M104 S{temp}
    M109 S{temp}

    STATUS_BUSY
    G91
    G92 E0
    G1 E25  F{speed}
    G1 E-420 F{max_velocity}

    STATUS_READY
    RESTORE_GCODE_STATE NAME=unload_state
    M104 S0

[gcode_macro CLEAN_NOZZLE_PARK]
description: Park above ooze bucket before cleaning.
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %} G28 {% endif %}
    G90
    G1 X288 Y307 Z1 F6000  ; Position over ooze bucket

[gcode_macro CLEAN_NOZZLE]
description: Scrub nozzle with brush pattern.
variable_start_x:     273
variable_start_y:     300
variable_start_z:     1
variable_wipe_dist:   -35
variable_wipe_qty:    5
variable_wipe_spd:    200
variable_raise_distance: 10
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %} G28 {% endif %}
    G90
    G1 X{start_x} Y{start_y} F6000
    G1 Z{start_z} F1500
    {% for wipe in range(1, wipe_qty + 1) %}
        G1 X{start_x + wipe_dist} Y{start_y}     F{wipe_spd * 60}
        G1 X{start_x}             Y{start_y}     F{wipe_spd * 60}
        G1 X{start_x + wipe_dist} Y{start_y - 5} F{wipe_spd * 60}
        G1 X{start_x}             Y{start_y - 5} F{wipe_spd * 60}
    {% endfor %}
    G1 X{start_x + 8} Z{raise_distance} F1500
